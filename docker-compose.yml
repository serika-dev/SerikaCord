# SerikaCord Docker Compose Configuration
# Complete development and production stack

services:
  # SerikaCord Application
  serikacord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serikacord-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://serikacord:${MONGO_PASSWORD}@mongodb:27017/serikacord?authSource=admin
      - MONGO_DB_NAME=serikacord
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
      - B2_BUCKET_ID=${B2_BUCKET_ID}
      - B2_ENDPOINT=${B2_ENDPOINT}
      - CDN_URL=${CDN_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - GATEWAY_URL=${GATEWAY_URL:-wss://api.serika.chat/api/v10/gateway}
      - API_BASE_URL=${API_BASE_URL:-https://api.serika.chat}
      - AWS_EMAIL_ENDPOINT=${AWS_EMAIL_ENDPOINT}
      - AWS_EMAIL_SMTP_PORT=${AWS_EMAIL_SMTP_PORT}
      - AWS_EMAIL_SMTP_USERNAME=${AWS_EMAIL_SMTP_USERNAME}
      - AWS_EMAIL_PASS=${AWS_EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - serikacord-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: serikacord-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=serikacord
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - serikacord-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["--wiredTigerCacheSizeGB", "1"]

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: serikacord-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=serikacord
      - POSTGRES_PASSWORD=devpostgres123
      - POSTGRES_DB=serikacord
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - serikacord-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serikacord -d serikacord"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: serikacord-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - serikacord-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: serikacord-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - serikacord
    networks:
      - serikacord-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  serikacord-network:
    driver: bridge
