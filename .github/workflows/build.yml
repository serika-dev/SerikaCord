name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Desktop (Tauri) — Windows (.exe/.msi), macOS (.dmg), Linux (.AppImage/.deb/.rpm)
  # frontendDist is a hosted URL, so no web build is needed.
  # ---------------------------------------------------------------------------
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            patchelf \
            build-essential \
            file

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri CLI
        working-directory: desktop-tauri
        run: bun install

      - name: Build Tauri app
        working-directory: desktop-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: bun run build

      - name: Sign AppImage
        if: matrix.name == 'linux'
        env:
          APPIMAGE_GPG_KEY: ${{ secrets.APPIMAGE_GPG_KEY }}
          APPIMAGE_GPG_PASSPHRASE: ${{ secrets.APPIMAGE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$APPIMAGE_GPG_KEY" ]; then
            echo "APPIMAGE_GPG_KEY secret not set — skipping AppImage signing"
            exit 0
          fi

          # Import GPG private key
          echo "$APPIMAGE_GPG_KEY" | gpg --batch --import --pinentry-mode loopback --passphrase "$APPIMAGE_GPG_PASSPHRASE" 2>/dev/null

          # Find the AppImage
          APPIMAGE=$(find desktop-tauri/src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found — skipping signing"
            exit 0
          fi

          echo "Signing: $APPIMAGE"
          gpg --batch --yes --pinentry-mode loopback --passphrase "$APPIMAGE_GPG_PASSPHRASE" \
            --detach-sign --armor "$APPIMAGE"

          echo "Signature created: ${APPIMAGE}.asc"
          gpg --verify "${APPIMAGE}.asc" "$APPIMAGE" && echo "Signature verified OK"

      - name: Upload Linux artifacts
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage.asc
            desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Windows artifacts
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe.sig
            desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
            desktop-tauri/src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: warn
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            desktop-tauri/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop-tauri/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Android (Capacitor) — signed release APK
  # ---------------------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java version
        run: |
          java -version
          javac -version
          echo "JAVA_HOME=${JAVA_HOME}"
          which java

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: bun install

      - name: Sync Capacitor
        working-directory: mobile
        run: bunx cap sync android

      - name: Generate release keystore
        working-directory: mobile/android/app
        run: |
          keytool -genkeypair -v -keystore release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'serikacord' }}" \
            -alias serikacord \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD || 'serikacord' }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=SerikaCord,O=Serika,C=US"

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Clear Gradle cache and daemon
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf mobile/android/.gradle
          rm -rf mobile/android/app/build

      - name: Build Android APK
        working-directory: mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'serikacord' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'serikacord' }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          mkdir -p apk-out
          cp mobile/android/app/build/outputs/apk/release/*.apk "apk-out/SerikaCord-${TAG}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk-out/*.apk
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Publish GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: ls -R artifacts || true

      - name: Generate updater latest.json
        run: |
          python3 << 'PYEOF'
          import os, json, glob, datetime

          tag = os.environ.get('GITHUB_REF_NAME', 'latest')
          version = tag.lstrip('v')
          base_url = f"https://github.com/serika-dev/SerikaCord/releases/download/{tag}"

          sig_files = sorted(glob.glob('artifacts/**/*/*.sig', recursive=True))
          platforms = {}

          for sig in sig_files:
              base_name = os.path.basename(sig)[:-4]
              bundle_dir = os.path.dirname(sig)
              bundle_path = os.path.join(bundle_dir, base_name)
              if not os.path.exists(bundle_path):
                  continue

              name = base_name.lower()
              key = None
              if name.endswith('.appimage'):
                  key = 'linux-x86_64'
              elif name.endswith('.exe'):
                  key = 'windows-x86_64'
              elif name.endswith('.app.tar.gz'):
                  key = 'darwin-aarch64'
              elif name.endswith('.msi'):
                  continue
              else:
                  continue

              if key in platforms:
                  continue

              with open(sig, 'r') as f:
                  signature = f.read().strip()

              platforms[key] = {
                  'signature': signature,
                  'url': f'{base_url}/{base_name}',
              }

          latest = {
              'version': version,
              'notes': f'SerikaCord {version}',
              'pub_date': datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': platforms,
          }

          with open('artifacts/latest.json', 'w') as f:
              json.dump(latest, f, indent=2)

          print(json.dumps(latest, indent=2))
          PYEOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: SerikaCord ${{ inputs.tag || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, 'beta') || contains(inputs.tag || github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
